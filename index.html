  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

0);--accent-bg:rgba(47,111,214,0.10);\n  --purple:#7c5dd6;--purple-bg:rgba(124,93,214,0.10);\n  --font:'DM Sans',sans-serif;--mono:'DM Mono',monospace;\n  --safe-top:env(safe-area-inset-top,0px);\n  --safe-bottom:env(safe-area-inset-bottom,0px);\n}\n*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}\nhtml,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font);font-size:14px;line-height:1.5;overflow:hidden}\n::-webkit-scrollbar{display:none}\n\n/* App shell */\n.app{display:flex;flex-direction:column;height:100vh;height:100dvh;overflow:hidden;\n  padding-top:var(--safe-top);padding-bottom:var(--safe-bottom)}\n\n/* Top header */\n.header{padding:10px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;\n  border-bottom:1px solid var(--border)}\n.header-left{display:flex;align-items:center;gap:10px}\n.logo{width:30px;height:30px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px}\n.app-title{font-size:14px;font-weight:600;letter-spacing:-0.01em}\n.app-sub{font-size:10px;color:var(--text2)}\n.clock{font-size:11px;color:var(--text2);font-family:var(--mono);text-align:right;line-height:1.3}\n\n/* Content area */\n.content{flex:1;overflow:hidden;display:flex;flex-direction:column}\n.pane{display:none;flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px 16px;height:100%}\n.pane.active{display:block}\n\n/* Bottom nav */\n.bottom-nav{display:flex;border-top:1px solid var(--border);flex-shrink:0;background:var(--bg)}\n.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 4px;gap:3px;cursor:pointer;border:none;background:none;color:var(--text3);font-family:var(--font);font-size:9px;transition:color .15s;min-height:52px}\n.nav-item.active{color:var(--accent)}\n.nav-item .nav-icon{font-size:20px;line-height:1}\n.nav-item .nav-label{font-size:9px;font-weight:500;white-space:nowrap}\n\n/* More menu */\n.more-menu{position:fixed;bottom:calc(52px + var(--safe-bottom));left:0;right:0;background:var(--bg2);border-top:1px solid var(--border2);border-radius:20px 20px 0 0;padding:16px;z-index:100;transform:translateY(100%);transition:transform .25s ease}\n.more-menu.open{transform:translateY(0)}\n.more-menu-item{display:flex;align-items:center;gap:12px;padding:12px 8px;border-radius:10px;cursor:pointer;font-size:14px;color:var(--text2)}\n.more-menu-item:hover{background:var(--bg3);color:var(--text)}\n.more-menu-item .mi-icon{font-size:20px;width:28px;text-align:center}\n.more-overlay{position:fixed;inset:0;z-index:99;display:none}\n.more-overlay.open{display:block}\n\n/* Cards */\n.sum-bar{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}\n.sum-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:12px 14px}\n.sum-lbl{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:3px}\n.sum-val{font-size:22px;font-weight:600;letter-spacing:-0.03em;line-height:1}\n.sum-sub{font-size:10px;color:var(--text2);margin-top:2px}\n.card{background:var(--bg2);border:1px solid var(--border);border-radius:12px}\n.section-title{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.07em;margin-bottom:10px}\n\n/* Alert */\n.alert{border-radius:10px;padding:12px 14px;margin-bottom:12px;border:1px solid}\n.alert-red{background:var(--red-bg);border-color:rgba(240,80,96,.25)}\n.alert-amber{background:var(--amber-bg);border-color:rgba(245,166,35,.25)}\n.alert-head{font-size:12px;font-weight:600;margin-bottom:5px}\n.alert-red .alert-head{color:var(--red)}\n.alert-amber .alert-head{color:var(--amber)}\n.alert-item{font-size:12px;display:flex;justify-content:space-between;padding:2px 0}\n.alert-red .alert-item{color:#a3232f}\n.alert-amber .alert-item{color:#8a5305}\n.alert-item-info{font-family:var(--mono);font-size:10px;color:var(--text2)}\n\n/* Search & chips */\n.search-wrap{position:relative;margin-bottom:12px}\n.search-wrap input{width:100%;padding:9px 12px 9px 34px;background:var(--bg2);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:14px;font-family:var(--font);outline:none}\n.search-wrap input:focus{border-color:var(--accent)}\n.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:14px;pointer-events:none}\n.chips{display:flex;gap:7px;flex-wrap:nowrap;overflow-x:auto;margin-bottom:12px;padding-bottom:4px}\n.chips::-webkit-scrollbar{display:none}\n.chip{padding:6px 13px;border-radius:20px;font-size:12px;cursor:pointer;border:1px solid var(--border);background:none;color:var(--text2);font-family:var(--font);white-space:nowrap;flex-shrink:0}\n.chip.c-all{background:var(--accent-bg);border-color:var(--accent);color:var(--accent)}\n.chip.c-red{background:var(--red-bg);border-color:var(--red);color:var(--red)}\n.chip.c-amber{background:var(--amber-bg);border-color:var(--amber);color:var(--amber)}\n.chip.c-green{background:var(--green-bg);border-color:var(--green);color:var(--green)}\n\n/* Scent list items (mobile-friendly cards instead of table) */\n.scent-list{display:flex;flex-direction:column;gap:8px}\n.scent-item{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:12px 14px}\n.scent-item-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}\n.scent-name{font-size:13px;font-weight:500}\n.scent-meta{font-size:11px;color:var(--text2);display:flex;gap:10px;margin-top:3px}\n.scent-meta span{font-family:var(--mono)}\n.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:500}\n.badge-red{background:var(--red-bg);color:var(--red)}\n.badge-amber{background:var(--amber-bg);color:var(--amber)}\n.badge-green{background:var(--green-bg);color:var(--green)}\n.badge-blue{background:var(--accent-bg);color:var(--accent)}\n.badge-grey{background:var(--bg3);color:var(--text3)}\n.bar-bg{height:4px;background:var(--bg3);border-radius:2px;overflow:hidden;margin-top:6px}\n.bar-fill{height:100%;border-radius:2px;background:var(--accent)}\n\n/* Eingabe mobile */\n.day-nav{display:flex;align-items:center;gap:8px;margin-bottom:14px}\n.day-nav-btn{width:36px;height:36px;border:1px solid var(--border);border-radius:9px;background:var(--bg2);color:var(--text2);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}\n.day-badge{background:var(--accent-bg);border:1px solid rgba(79,142,247,.3);color:var(--accent);border-radius:8px;padding:5px 12px;font-size:13px;font-weight:500;flex:1;text-align:center}\n.date-input{background:var(--bg2);border:1px solid var(--border);border-radius:9px;padding:5px 10px}\n.date-input input{background:none;border:none;color:var(--text);font-family:var(--font);font-size:13px;outline:none}\n.save-btn{padding:8px 16px;background:var(--green);border:none;border-radius:9px;color:#0a2818;font-size:13px;font-weight:600;cursor:pointer;font-family:var(--font);flex-shrink:0}\n\n/* Slot cards */\n.slot-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:12px 14px;margin-bottom:10px}\n.slot-header{display:flex;align-items:center;gap:8px;margin-bottom:10px}\n.slot-time{font-family:var(--mono);font-size:14px;font-weight:600;color:var(--text2)}\n.slot-time.peak{color:var(--green)}\n.slot-time.peeling{color:var(--purple)}\n.slot-time.parallel{color:var(--amber)}\n.slot-time.extra{color:var(--green)}\n.slot-done .slot-time{color:var(--green)}\n.slot-done{border-color:rgba(46,204,138,.2);background:rgba(46,204,138,.03)}\n.slot-field{margin-bottom:8px}\n.slot-field label{font-size:10px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;display:block;margin-bottom:3px}\n.slot-field select,.slot-field input{width:100%;padding:9px 12px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:13px;font-family:var(--font);outline:none;-webkit-appearance:none}\n.slot-field select:focus,.slot-field input:focus{border-color:var(--accent)}\n.slot-field select option{background:#1d2435}\n.slot-grid-2{display:grid;grid-template-columns:1fr 1fr;gap:8px}\n.slot-grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}\n.done-dot{width:6px;height:6px;border-radius:50%;background:var(--green);display:inline-block;margin-left:4px}\n.hist-dot{width:6px;height:6px;border-radius:50%;background:var(--accent);display:inline-block;margin-left:4px}\n.over50{background:var(--red-bg);color:var(--red);border-radius:4px;font-size:10px;font-family:var(--mono);padding:1px 5px;margin-left:4px}\n\n/* Incomplete banner */\n.incomplete-banner{border-radius:10px;padding:10px 14px;margin-bottom:12px;border:1px solid;font-size:12px}\n\n/* Add time row */\n.add-time-row{display:flex;align-items:center;gap:8px;padding:10px 0}\n.add-time-input{width:70px;padding:8px 10px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:13px;font-family:var(--mono);outline:none;text-align:center}\n.add-btn{padding:8px 14px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;color:var(--text2);font-size:13px;cursor:pointer;font-family:var(--font)}\n\n/* Stoßzeiten */\n.hour-bar-row{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--border)}\n.hour-bar-row:last-child{border-bottom:none}\n.hour-lbl{font-family:var(--mono);font-size:12px;color:var(--text2);width:42px;flex-shrink:0}\n.hour-bar-bg{flex:1;height:18px;background:var(--bg3);border-radius:4px;overflow:hidden}\n.hour-bar-fill{height:100%;border-radius:4px;display:flex;align-items:center;padding:0 8px;font-size:10px;font-weight:600;color:#fff}\n.hour-val{font-family:var(--mono);font-size:10px;color:var(--text2);width:46px;text-align:right;flex-shrink:0}\n.hour-bar-row.peak .hour-lbl{color:var(--green);font-weight:600}\n.hour-bar-row.peak .hour-bar-fill{background:var(--green)}\n.hour-bar-row:not(.peak) .hour-bar-fill{background:var(--accent)}\n\n/* MA rows */\n.ma-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)}\n.ma-row:last-child{border-bottom:none}\n.ma-avatar{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;flex-shrink:0}\n.ma-bar-bg{flex:1;height:4px;background:var(--bg3);border-radius:2px;overflow:hidden;margin-top:3px}\n.ma-bar-fill{height:100%;border-radius:2px}\n\n/* Dienstplan mobile */\n.dp-day-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:8px}\n.dp-day-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}\n.dp-day-name{font-size:13px;font-weight:600}\n.dp-day-date{font-family:var(--mono);font-size:11px;color:var(--text2)}\n.dp-staff-chips{display:flex;flex-wrap:wrap;gap:5px}\n.dp-staff-chip{padding:3px 9px;border-radius:20px;font-size:11px;font-weight:500}\n\n/* Auswertung */\n.month-picker{width:100%;padding:10px 14px;background:var(--bg2);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:14px;font-family:var(--font);outline:none;margin-bottom:14px;-webkit-appearance:none}\n.aus-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:12px}\n.aus-card-title{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px}\n.mini-bar-row{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid var(--border)}\n.mini-bar-row:last-child{border-bottom:none}\n.mini-lbl{flex:1;font-size:12px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}\n.mini-bar-bg{width:80px;height:5px;background:var(--bg3);border-radius:3px;overflow:hidden}\n.mini-bar-fill{height:100%;border-radius:3px}\n.mini-val{font-family:var(--mono);font-size:11px;color:var(--text);min-width:34px;text-align:right}\n\n/* Install banner */\n.install-banner{background:var(--accent-bg);border:1px solid rgba(79,142,247,.3);border-radius:10px;padding:12px 14px;margin-bottom:14px;display:flex;align-items:center;gap:10px}\n.install-btn{padding:7px 14px;background:var(--accent);border:none;border-radius:7px;color:#fff;font-size:12px;font-weight:600;cursor:pointer;font-family:var(--font);white-space:nowrap;flex-shrink:0}\n\n/* Toast */\n.toast{position:fixed;bottom:calc(60px + var(--safe-bottom) + 10px);left:50%;transform:translateX(-50%);padding:10px 20px;border-radius:8px;font-size:13px;font-weight:500;z-index:999;white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,.4);transition:opacity .3s}\n\n.tile{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:16px 14px;cursor:pointer;text-align:left;font-family:var(--font);transition:transform .1s,opacity .15s;-webkit-tap-highlight-color:transparent;display:flex;flex-direction:column;gap:4px}\n.tile:active{transform:scale(0.97);opacity:.85}\n.tile-icon{font-size:26px;line-height:1;margin-bottom:2px}\n.tile-name{font-size:14px;font-weight:600;color:var(--text)}\n.tile-sub{font-size:11px;color:var(--text2)}\n.tile-badge{display:inline-block;background:var(--red-bg);color:var(--red);border-radius:10px;font-size:10px;font-weight:600;padding:1px 7px;margin-top:3px}\n.qnav-btn{padding:5px 11px;border-radius:20px;font-size:12px;border:1px solid var(--border);background:none;color:var(--text2);cursor:pointer;font-family:var(--font);white-space:nowrap;flex-shrink:0;transition:all .15s}\n.qnav-btn:hover{border-color:var(--border2);color:var(--text)}\n.qnav-btn.active{background:var(--accent-bg);border-color:var(--accent);color:var(--accent)}\n@media(min-width:640px){\n  .sum-bar{grid-template-columns:repeat(4,1fr)}\n  .bottom-nav{max-width:640px;margin:0 auto;width:100%}\n  .content{max-width:640px;margin:0 auto;width:100%}\n  .header{max-width:640px;margin:0 auto;width:100%}\n}\n\n/* ===== Light theme overrides ===== */\n.logo{color:#fff}\n.tile{color:var(--text)!important}\n.tile .tile-sub{color:var(--text2)!important}\nbutton.tile[onclick*=\"eingabe\"]{background:linear-gradient(135deg,#e8f0ff,#dde8fb)!important;border-color:rgba(47,111,214,.25)!important}\nbutton.tile[onclick*=\"lager\"]{background:linear-gradient(135deg,#e6f6ee,#d9f0e3)!important;border-color:rgba(15,169,104,.25)!important}\nbutton.tile[onclick*=\"stosszeit\"]{background:linear-gradient(135deg,#fdf2dc,#fae6c2)!important;border-color:rgba(196,122,9,.25)!important}\nbutton.tile[onclick*=\"mitarbeiter\"]{background:linear-gradient(135deg,#f1ecfb,#e7dffa)!important;border-color:rgba(124,93,214,.25)!important}\nbutton.tile[onclick*=\"dienstplan\"]{background:linear-gradient(135deg,#e8eef8,#dee6f3)!important;border-color:rgba(47,111,214,.18)!important}\nbutton.tile[onclick*=\"auswertung\"]{background:linear-gradient(135deg,#f0eafa,#e6dcf6)!important;border-color:rgba(124,93,214,.2)!important}\nbutton.tile[onclick*=\"bestellen\"]{background:linear-gradient(135deg,#fcecd5,#f8e0bb)!important;border-color:rgba(196,122,9,.25)!important}\nbutton.tile[onclick*=\"einstellungen\"]{background:linear-gradient(135deg,#eef0f5,#e3e6ee)!important;border-color:rgba(94,101,119,.2)!important}\nbutton.tile[onclick*=\"duftberater\"]{background:linear-gradient(135deg,#e6f5ec,#d6eede)!important;border-color:rgba(15,169,104,.25)!important}\n.alert-red .alert-item{color:#a3232f}\n.alert-amber .alert-item{color:#8a5305}\n.save-btn{color:#fff!important}\n::-webkit-scrollbar-thumb{background:rgba(0,0,0,0.18);border-radius:4px}\n/* Soft shadow under cards for depth on light bg */\n.sum-card,.card{box-shadow:0 1px 2px rgba(15,17,23,0.04),0 1px 1px rgba(15,17,23,0.03)}\n.more-menu{background:#fff;box-shadow:0 -8px 32px rgba(15,17,23,0.12)}\n.bottom-nav{background:#fff;box-shadow:0 -1px 0 var(--border)}\n\n/* Trend & Cost cards */\n.trend-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}\n.trend-cell{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:10px}\n.trend-lbl{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px}\n.trend-val{font-size:18px;font-weight:600;letter-spacing:-0.02em;line-height:1.1;margin-bottom:4px;font-family:var(--mono)}\n.trend-delta{font-size:10px;font-weight:600;font-family:var(--mono);line-height:1.3}\n.trend-delta .trend-vs{font-weight:400;color:var(--text3);display:block;margin-top:1px}\n.trend-up{color:var(--green)}\n.trend-down{color:var(--red)}\n.trend-flat{color:var(--text2)}\n.cost-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--border)}\n.cost-row:last-child{border-bottom:none}\n.cost-row-main{flex:1;min-width:0}\n.cost-name{font-size:12px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}\n.cost-meta{font-size:10px;color:var(--text2);font-family:var(--mono);margin-top:2px}\n.cost-bar-bg{margin-top:5px;height:3px;background:var(--bg3);border-radius:2px;overflow:hidden}\n.cost-bar-fill{height:100%;background:var(--accent);border-radius:2px}\n.cost-row-val{font-family:var(--mono);font-size:12px;color:var(--text);min-width:60px;text-align:right;flex-shrink:0}\n.cost-row-total{border-top:1px solid var(--border2);border-bottom:none;margin-top:4px;padding-top:11px}\n@media(max-width:380px){.trend-grid{grid-template-columns:1fr 1fr}.trend-cell:nth-child(3){grid-column:span 2}}\n\n/* Recent scents banner (Eingabe) */\n.recent-panel{background:var(--amber-bg);border:1px solid rgba(196,122,9,.22);border-radius:10px;padding:10px 12px;margin-bottom:12px}\n.recent-head{font-size:11px;font-weight:600;color:var(--amber);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px;display:flex;align-items:center;justify-content:space-between}\n.recent-chips{display:flex;flex-wrap:wrap;gap:5px}\n.recent-chip{display:inline-flex;align-items:center;gap:4px;background:#fff;border:1px solid var(--border);border-radius:14px;padding:3px 9px;font-size:11px;color:var(--text)}\n.recent-chip-cnt{font-family:var(--mono);color:var(--amber);font-weight:600;font-size:10px}\n.recent-chip.hot{border-color:var(--amber);background:rgba(196,122,9,.08)}\n\n/* Heatmap */\n.hm-grid{display:grid;gap:3px}\n.hm-row{display:grid;gap:3px;align-items:center}\n.hm-h{font-family:var(--mono);font-size:10px;color:var(--text2);text-align:right;padding-right:4px}\n.hm-cell{aspect-ratio:1;border-radius:4px;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:9px;color:#fff;font-weight:600;min-height:24px;background:var(--bg3);position:relative}\n.hm-cell.empty{background:var(--bg3);color:var(--text3);font-weight:400;font-size:9px}\n.hm-head{font-family:var(--mono);font-size:10px;color:var(--text2);text-align:center;font-weight:600}\n.hm-legend{display:flex;align-items:center;gap:6px;margin-top:10px;font-size:10px;color:var(--text2);font-family:var(--mono)}\n.hm-legend-bar{height:8px;flex:1;border-radius:4px;background:linear-gradient(to right,var(--bg3),#fde7c2,#f5a623,#e07810,#a83a06)}\n\n/* Weekly KPI card */\n.week-card{background:linear-gradient(135deg,#eaf2ff,#dde8fb);border:1px solid rgba(47,111,214,.22);border-radius:12px;padding:14px;margin-bottom:14px}\n.week-head{font-size:11px;font-weight:600;color:var(--accent);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between}\n.week-sub{font-size:10px;color:var(--text2);font-weight:500;text-transform:none;letter-spacing:0;font-family:var(--mono)}\n.week-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}\n.week-stat-lbl{font-size:10px;color:var(--text2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:3px}\n.week-stat-val{font-size:20px;font-weight:600;letter-spacing:-0.02em;font-family:var(--mono);line-height:1.1}\n.week-stat-delta{font-size:10px;font-weight:600;font-family:var(--mono);margin-top:3px}\n\n/* Forecast */\n.fc-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:8px}\n.fc-cell{background:var(--bg);border:1px dashed var(--border2);border-radius:10px;padding:10px}\n.fc-lbl{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px}\n.fc-val{font-size:18px;font-weight:600;letter-spacing:-0.02em;font-family:var(--mono);line-height:1.1}\n.fc-range{font-size:10px;color:var(--text2);font-family:var(--mono);margin-top:3px}\n.fc-note{font-size:11px;color:var(--text2);padding-top:10px;border-top:1px solid var(--border);margin-top:4px;line-height:1.45}\n\n/* Seasonal */\n.season-panel{background:linear-gradient(135deg,#f0eafa,#e6dcf6);border:1px solid rgba(124,93,214,.22);border-radius:12px;padding:14px;margin-bottom:16px}\n.season-head{font-size:11px;font-weight:600;color:var(--purple);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between}\n.season-fams{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px}\n.season-fam{background:#fff;border:1px solid rgba(124,93,214,.3);border-radius:14px;padding:3px 10px;font-size:11px;color:var(--purple);font-weight:500}\n.season-scents{display:grid;gap:5px}\n.season-scent{display:flex;align-items:center;justify-content:space-between;background:rgba(255,255,255,.6);border-radius:8px;padding:6px 10px;font-size:12px}\n.season-scent-meta{font-size:10px;color:var(--text2);font-family:var(--mono)}\n.season-scent.out{opacity:.55}\n.season-scent.out .season-scent-meta{color:var(--red)}\n\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n<div class=\"app\">\n\n  <!-- Header -->\n  <div class=\"header\">\n    <div class=\"header-left\">\n      <div class=\"logo\">🧴<\u002Fdiv>\n      <div><div class=\"app-title\">Aufguss Manager<\u002Fdiv><div class=\"app-sub\">Bodetal Therme Thale<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"clock\" id=\"live-clock\"><\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- Content -->\n  <div class=\"content\">\n\n    <!-- HOME -->\n    <div id=\"tab-home\" class=\"pane\">\n      <div style=\"padding:4px 0 12px\">\n        <div style=\"font-size:13px;color:var(--text2);margin-bottom:14px\" id=\"home-greeting\"><\u002Fdiv>\n\n        <!-- Alert strip -->\n        <div id=\"home-alert\"><\u002Fdiv>\n\n        <!-- Main tiles -->\n        <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px\">\n          <button class=\"tile\" onclick=\"goTo('eingabe')\" style=\"background:linear-gradient(135deg,#1a2d4a,#1d3a5c);border-color:rgba(79,142,247,.3)\">\n            <div class=\"tile-icon\">✏️<\u002Fdiv>\n            <div class=\"tile-name\">Eingabe<\u002Fdiv>\n            <div class=\"tile-sub\">Aufguss eintragen<\u002Fdiv>\n          <\u002Fbutton>\n          <button class=\"tile\" onclick=\"goTo('lager')\" id=\"tile-lager\" style=\"background:linear-gradient(135deg,#1a2d1a,#1d3a1d);border-color:rgba(46,204,138,.2)\">\n            <div class=\"tile-icon\">🧴<\u002Fdiv>\n            <div class=\"tile-name\">Duft-Lager<\u002Fdiv>\n            <div class=\"tile-sub\" id=\"tile-lager-sub\">Bestand prüfen<\u002Fdiv>\n          <\u002Fbutton>\n          <button class=\"tile\" onclick=\"goTo('stosszeit')\" style=\"background:linear-gradient(135deg,#2a2010,#3a2c10);border-color:rgba(245,166,35,.2)\">\n            <div class=\"tile-icon\">⏰<\u002Fdiv>\n            <div class=\"tile-name\">Stoßzeiten<\u002Fdiv>\n            <div class=\"tile-sub\">Auslastung &amp; Zeiten<\u002Fdiv>\n          <\u002Fbutton>\n          <button class=\"tile\" onclick=\"goTo('mitarbeiter')\" style=\"background:linear-gradient(135deg,#2a1020,#3a1530);border-color:rgba(167,139,250,.2)\">\n            <div class=\"tile-icon\">👤<\u002Fdiv>\n            <div class=\"tile-name\">Mitarbeiter<\u002Fdiv>\n            <div class=\"tile-sub\">Übersicht &amp; Stats<\u002Fdiv>\n          <
